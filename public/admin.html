<!-- Painel de administracao - so acessivel com conta admin -->
<!-- Permite: ver estatisticas, adicionar profissionais, ver lista completa -->
<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple System — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- navbar vermelha para distinguir do site principal -->
  <nav class="navbar navbar-expand-md navbar-dark nav-admin">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-search me-2"></i>Simple System</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="menuNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door me-1"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="admin.html"><i class="bi bi-gear me-1"></i>Admin</a></li>
          <li class="nav-item"><a class="nav-link text-warning" href="#" id="botao-sair-admin"><i class="bi bi-box-arrow-right me-1"></i>Sair</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-4">
    <h4 class="fw-bold mb-4"><i class="bi bi-gear me-2"></i>Painel de Administracao</h4>

    <!-- cartoes com estatisticas por categoria -->
    <div class="row g-3 mb-4" id="estatisticas"></div>

    <!-- formulario para adicionar novo profissional -->
    <div class="card mb-4 border-0 shadow-sm">
      <div class="card-header fw-bold modal-azul"><i class="bi bi-plus-circle me-2"></i>Adicionar Profissional</div>
      <div class="card-body">
        <div id="msg-sucesso" class="alert alert-success d-none small"></div>
        <div id="msg-erro-form" class="alert alert-danger d-none small"></div>
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label fw-bold small">Nome</label><input type="text" class="form-control" id="f-nome"></div>
          <div class="col-md-6"><label class="form-label fw-bold small">Categoria</label><select class="form-select" id="f-categoria"><option value="">Selecionar...</option><option value="encanador">Encanador</option><option value="eletricista">Eletricista</option><option value="pintor">Pintor</option><option value="veterinario">Veterinario</option><option value="carpinteiro">Carpinteiro</option><option value="jardineiro">Jardineiro</option><option value="limpeza">Limpeza</option><option value="serralheiro">Serralheiro</option><option value="mecanico">Mecanico</option><option value="pedreiro">Pedreiro</option><option value="explicador">Explicador</option><option value="cabeleireiro">Cabeleireiro</option><option value="costureira">Costureira</option><option value="mudancas">Mudancas</option><option value="informatica">Informatica</option></select></div>
          <div class="col-md-6"><label class="form-label fw-bold small">Telefone</label><input type="text" class="form-control" id="f-telefone"></div>
          <div class="col-md-6"><label class="form-label fw-bold small">WhatsApp</label><input type="text" class="form-control" id="f-whatsapp"></div>
          <div class="col-md-4"><label class="form-label fw-bold small">Latitude</label><input type="text" class="form-control" id="f-lat" value="40.110355"></div>
          <div class="col-md-4"><label class="form-label fw-bold small">Longitude</label><input type="text" class="form-control" id="f-lng" value="-8.495044"></div>
          <div class="col-md-4"><label class="form-label fw-bold small">Avaliacao</label><input type="number" class="form-control" id="f-avaliacao" min="0" max="5" step="0.1" value="4.5"></div>
          <div class="col-12"><label class="form-label fw-bold small">Descricao</label><input type="text" class="form-control" id="f-descricao"></div>
          <div class="col-12"><button class="btn btn-success fw-bold" id="botao-adicionar"><i class="bi bi-plus-lg me-1"></i>Adicionar</button></div>
        </div>
      </div>
    </div>

    <!-- tabela com todos os profissionais -->
    <div class="card border-0 shadow-sm">
      <div class="card-header fw-bold" style="background:var(--azul-escuro);color:white"><i class="bi bi-people me-2"></i>Profissionais <span class="badge bg-light text-dark ms-2" id="total-badge">0</span></div>
      <div class="card-body p-0"><div class="table-responsive"><table class="table table-hover table-sm mb-0"><thead class="table-light"><tr><th>Nome</th><th>Categoria</th><th>Telefone</th><th>Nota</th><th>Descricao</th></tr></thead><tbody id="tabela-profissionais"></tbody></table></div></div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
